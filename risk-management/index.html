<h1>Risk Managment</h1>
<p>We created the DISO ontology cluster <code>risk-management</code> to hold OWL ontologies that relate to <strong>risk management</strong> in some way.</p>
<p>Note that the notion of <strong>risk management</strong> overlaps with <strong>cyber-security</strong>.</p>
